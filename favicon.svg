<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <clipPath id="cc" clip-rule="evenodd">
      <path d="M0,0 H32 V32 H0 Z
               M11.5,8.5 L15,7 L18.5,16.5 L15,18 Z" clip-rule="evenodd"/>
    </clipPath>
    <filter id="g" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feComponentTransfer in="b"><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0A0E1A"/>
  <!-- Glow layer -->
  <g filter="url(#g)">
    <path d="M 4.5,27 C 4.5,17 6.5,4 9.5,4 C 12,4 14,15 16,20 C 17,22.5 18,25 20,27"
          fill="none" stroke="url(#fg)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 12,27 C 14,25 15,22.5 16,20 C 18,15 20,4 22.5,4 C 25.5,4 27.5,17 27.5,27"
          fill="none" stroke="url(#fg)" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Path A (under) — clipped at crossing -->
  <path d="M 4.5,27 C 4.5,17 6.5,4 9.5,4 C 12,4 14,15 16,20 C 17,22.5 18,25 20,27"
        fill="none" stroke="url(#fg)" stroke-width="4" stroke-linecap="round"
        clip-path="url(#cc)"/>
  <!-- Path B (over) — on top -->
  <path d="M 12,27 C 14,25 15,22.5 16,20 C 18,15 20,4 22.5,4 C 25.5,4 27.5,17 27.5,27"
        fill="none" stroke="url(#fg)" stroke-width="4" stroke-linecap="round"/>
</svg>
